tasks.register('installGitHooks') {
    doLast {
        def gitHooksDir = new File(rootProject.rootDir, '.git/hooks')

        if (gitHooksDir.exists()) {
            def commitMsgHook = new File(gitHooksDir, 'commit-msg')
            def commitMsgScript = """#!/bin/sh

if ! docker ps --filter "name=credit-quality-gate" --filter "status=running" --format "{{.Names}}" | grep -q "credit-quality-gate"; then
    echo ""
    echo "❌ [ERRO] Commit abortado por seguranca de Infraestrutura!"
    echo "💡 O container de ferramentas 'credit-quality-gate' esta DESLIGADO."
    echo "👉 Ative o ambiente de qualidade rodando: docker compose -f docker-compose.tools.yml up -d"
    echo ""
    exit 1
fi

COMMIT_MSG_FILE=\$1

# 1. CAPTURA UNIVERSAL DA OPERAÇÃO DE AMEND
AMEND_FLAG=""
if echo "\$GIT_REFLOG_ACTION" | grep -qi "amend" || wmic process where "name='git.exe'" get commandline 2>/dev/null | grep -qi "amend"; then
    AMEND_FLAG="--amend"
fi

# 2. ENGENHARIA HÍBRIDA: Extrai o log da máquina host e injeta no arquivo temporário do container
git log --format="%s" > .git/hooks/history.tmp 2>/dev/null
docker exec -i credit-quality-gate sh -c "cat > /tmp/history.txt" < .git/hooks/history.tmp 2>/dev/null
rm -f .git/hooks/history.tmp

# 3. TRANSMISSÃO DA MENSAGEM DO COMMIT PARA VALIDAÇÃO NO NODE.JS
docker exec -i credit-quality-gate sh -c "cat > /tmp/msg.txt && node validate-msg.js /tmp/msg.txt \$AMEND_FLAG" < "\$COMMIT_MSG_FILE"

if [ \$? -ne 0 ]; then
    exit 1
fi

exit 0
"""
            commitMsgHook.text = commitMsgScript
            commitMsgHook.setExecutable(true)

            def oldBat = new File(gitHooksDir, 'commit-msg.bat')
            if (oldBat.exists()) oldBat.delete()
        }
    }
}
