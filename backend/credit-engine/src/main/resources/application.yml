spring:
  application:
    name: credit-engine
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/credit_assignment_db}
    username: ${SPRING_DATASOURCE_USERNAME:platform_user}
    password: ${SPRING_DATASOURCE_PASSWORD:platform_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} level=%-5level class=%logger{36} correlationId=%X{correlationId:-} transactionId=%X{transactionId:-} %msg%n"
